trigger:
  branches:
    include:
      - main

variables:
  imageRepository: 'codealpha-azure-cicd-pipeline'
  dockerRegistryServiceConnection: 'acr-service-connection'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build_Test_Scan_Push
    displayName: Build, Test, Scan, and Push Docker Image
    jobs:
      - job: Build
        displayName: Build Job
        steps:
          - task: NodeTool@0
            displayName: Install Node.js
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: Install dependencies

          - script: npm test
            displayName: Run automated tests

          - script: docker build -t $(imageRepository):$(tag) .
            displayName: Build Docker image for scanning

          - script: |
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL $(imageRepository):$(tag)
            displayName: Run Docker security scan

          - task: Docker@2
            displayName: Build and push image to Azure Container Registry
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: Dockerfile
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest