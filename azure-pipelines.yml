trigger:
  branches:
    include:
      - main

variables:
  imageRepository: 'codealpha-azure-cicd-pipeline'
  containerRegistry: 'codealphaacr090-h2c3hnddaqesdse3.azurecr.io'
  dockerRegistryServiceConnection: 'acr-service-connection'
  azureSubscription: 'azure-service-connection'
  appName: 'codealpha-cicd-taskmanager090'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build_Test_Scan_Push
    displayName: Build, Test, Scan, and Push Docker Image
    jobs:
      - job: Build
        displayName: Build Job
        steps:
          - task: NodeTool@0
            displayName: Install Node.js
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: Install dependencies

          - script: npm test
            displayName: Run automated tests

          - script: docker build -t $(imageRepository):$(tag) .
            displayName: Build Docker image for scanning

          - script: |
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL $(imageRepository):$(tag)
            displayName: Run Docker security scan

          - task: Docker@2
            displayName: Build and push image to Azure Container Registry
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: Dockerfile
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: Build_Test_Scan_Push
    condition: succeeded()
    jobs:
      - job: Deploy
        displayName: Deploy Job
        steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy container to Azure App Service
            inputs:
              azureSubscription: $(azureSubscription)
              appName: $(appName)
              containers: '$(containerRegistry)/$(imageRepository):$(tag)'